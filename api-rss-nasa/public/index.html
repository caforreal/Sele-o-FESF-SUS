<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notícias da NASA em Português</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/header.css" />
  <link rel="stylesheet" href="styles/astronaut.css" />
</head>

<body>

  <header class="header-stars">

    <!--Astronaut-->
    <div class="astronaut-wrapper" id="astronaut">
      <div class="astronaut">
        <div class="head"></div>
        <div class="arm arm-left"></div>
        <div class="arm arm-right"></div>
        <div class="body"><div class="panel"></div></div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
        <div class="schoolbag"></div>
      </div>
    </div>
    
    <!--Astronaut-->  

    <div class="glow-content">
      <strong>Notícias NASA em Português </strong>
      <div id="glow">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
      </div>
    </div>
    <div id="container-stars">
      <div id="stars"></div>
    </div>
  </header>

  <!-- Lista de notícias -->
  <ul id="news-list"></ul>

  <!-- Scripts -->
  <script src="scripts/app.js" defer></script>
  <script src="scripts/astronaut.js" defer></script>
</body>
</html>
