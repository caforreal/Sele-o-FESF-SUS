<h1>Monitoramento de Devices</h1>

<table border="1" cellpadding="10">
    <tr>
        <th>Device</th>
        <th>IP</th>
        <th>Status</th>
    </tr>

    {% for device in devices %}

    <tr>
        <td>{{ device.name }}</td>
        <td>{{ device.ip }}</td>

        <td>

            {% if device.status == "online" %}

                🟢 ONLINE

            {% elif device.status == "offline" %}

                🔴 OFFLINE

            {% else %}

                ⚪ UNKNOWN

            {% endif %}

        </td>

    </tr>

    {% endfor %}

</table>
