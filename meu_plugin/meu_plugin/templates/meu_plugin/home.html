{% extends 'base/layout.html' %}

{% load render_table from django_tables2 %}

{% block content %}

<h1>Network Monitor</h1>

<div class="row mb-4">

    <div class="col-md-3">
        <div class="card border-success">
            <div class="card-body">
                <h5>🟢 Online</h5>
                <h2>{{ online_count }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card border-danger">
            <div class="card-body">
                <h5>🔴 Offline</h5>
                <h2>{{ offline_count }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card border-secondary">
            <div class="card-body">
                <h5>⚪ Unknown</h5>
                <h2>{{ unknown_count }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card border-info">
            <div class="card-body">
                <h5>📶 Avg Latency</h5>
                <h2>{{ avg_latency }} ms</h2>
            </div>
        </div>
    </div>

</div>

<form method="get" class="mb-4">

    <div class="input-group">

        <input
            type="text"
            name="q"
            id="search"
            class="form-control"
            placeholder="Search device..."
            value="{{ request.GET.q }}"
        >

        <button class="btn btn-primary">
            Search
        </button>

    </div>

</form>

{% render_table table %}

<script>
    setTimeout(function() {
        location.reload();
    }, 30000);

    search = document.getElementById('search');

    // Adiciona um trim para evitar buscas com apenas espaços

    // Adiciona debounce para evitar buscas a cada letra digitada

    search.addEventListener('input', function() {
        this.value = this.value.trim();
        if (this.value.length > 2) {
            while (this.value.debounced) {
                clearTimeout(this.value.debounced);
            }
            this.value.debounced = setTimeout(function() {
                this.form.submit();
            }.bind(this), 1500);
        }
    });

    search.addEventListener('blur', function() {
        if (this.value.length > 2) {
            this.form.submit();
        }
    });

    search.addEventListener('keypress', function(event) {
        if (event === 'Enter') {
            event.preventDefault();
            this.form.submit();
        }
    });
</script>

{% endblock %}
